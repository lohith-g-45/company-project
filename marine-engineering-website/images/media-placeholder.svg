<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Media Placeholder</title>
  <desc id="desc">Dummy image placeholder for media cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1f44"/>
      <stop offset="100%" stop-color="#243b82"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <g fill="#ffffff" font-family="Outfit, Arial, sans-serif" text-anchor="middle">
    <text x="600" y="360" font-size="68" font-weight="700">Media Placeholder</text>
    <text x="600" y="430" font-size="30" opacity="0.85">Dummy image for preview</text>
  </g>
</svg>
